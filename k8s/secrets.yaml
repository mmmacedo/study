# TEMPLATE — substitua os valores antes de aplicar.
# NUNCA commite senhas reais neste arquivo.
# Em produção use um vault externo (HashiCorp Vault, AWS Secrets Manager, etc.)
# ou o Sealed Secrets do Kubernetes para criptografar os values em git.
#
# Para gerar os valores base64:
#   echo -n "postgres" | base64   →  cG9zdGdyZXM=
#   echo -n "postgres" | base64   →  cG9zdGdyZXM=
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: staging
type: Opaque
data:
  username: cG9zdGdyZXM=   # postgres
  password: cG9zdGdyZXM=   # postgres  ← trocar em production
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: production
type: Opaque
data:
  username: cG9zdGdyZXM=   # postgres
  password: CHANGE_ME_BASE64  # nunca usar a senha de staging em production
