apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-service
  namespace: staging
  labels:
    app: stream-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stream-service
  # maxUnavailable: 0 garante zero-downtime — nenhum pod antigo é removido
  # antes de um novo estar pronto. maxSurge: 1 permite um pod extra durante o rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: stream-service
    spec:
      # podAntiAffinity distribui réplicas em nodes diferentes.
      # "preferred" (não "required") para não bloquear o deploy em clusters com poucos nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - stream-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: stream-service
        # $REGISTRY e $IMAGE_TAG são substituídos pelo envsubst no Jenkins antes do kubectl apply.
        # Nunca hardcodar tags de imagem nos YAMLs em git.
        image: ${REGISTRY}/stream-service:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: KAFKA_URL
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: kafka-url
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: keycloak-url
        - name: OTEL_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: otel-endpoint
        - name: TRACING_SAMPLING_PROBABILITY
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: tracing-sampling-probability
        - name: JAVA_OPTS
          value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # startupProbe: protege o livenessProbe de matar o pod durante o startup do Netty +
        # Spring Cloud Stream (inicialização dos canais Kafka). Janela: 15 * 2s = 30s.
        # Só depois que o startupProbe passar é que o livenessProbe entra em ação.
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          failureThreshold: 15
          periodSeconds: 2
        # livenessProbe: mata e reinicia o pod se ele travar após o startup.
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8083
          periodSeconds: 10
          failureThreshold: 3
        # readinessProbe: remove o pod do Service (sem receber tráfego) se não estiver pronto.
        # Garante que o pod só recebe conexões SSE quando os canais Kafka estiverem ativos.
        # Requer management.endpoint.health.probes.enabled: true no application.yml (já configurado).
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8083
          periodSeconds: 5
          failureThreshold: 3
