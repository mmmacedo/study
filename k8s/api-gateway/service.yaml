# ClusterIP: o api-gateway não é exposto diretamente.
# O tráfego externo chega via Ingress (nginx) → api-gateway Service → pods.
# Ver ingress.yaml para a regra de exposição pública.
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: staging
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
