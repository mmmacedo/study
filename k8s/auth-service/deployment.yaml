apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: staging
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - auth-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: auth-service
        image: ${REGISTRY}/auth-service:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: KAFKA_URL
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: kafka-url
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: keycloak-url
        - name: OTEL_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: otel-endpoint
        - name: TRACING_SAMPLING_PROBABILITY
          valueFrom:
            configMapKeyRef:
              name: shared-config
              key: tracing-sampling-probability
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: JAVA_OPTS
          value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        # Mesmo padrão do user-service: janela de 60s para Flyway + JPA
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          periodSeconds: 5
          failureThreshold: 3
