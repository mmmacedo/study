# =============================================================================
# auth-service — configuração da aplicação
# =============================================================================

server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # validate: Hibernate verifica o schema mas nunca o altera.
      # Flyway é responsável pelas migrations — JPA só valida.
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri (lazy) em vez de issuer-uri (eager):
          # issuer-uri faz chamada ao Keycloak no startup — a app não sobe se
          # o Keycloak estiver fora. jwk-set-uri só chama na primeira validação de JWT.
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/study/protocol/openid-connect/certs

  threads:
    virtual:
      # Virtual threads (Java 25 + Spring Boot 3.4):
      # Tomcat processa requests com virtual threads em vez de threads do pool.
      # Vantagem em I/O-bound: chamadas ao Keycloak (RestClient) e queries ao banco
      # bloqueiam virtualmente — o carrier thread fica livre para outros requests.
      enabled: true

# =============================================================================
# Keycloak — configuração do cliente
# =============================================================================
keycloak:
  base-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: study
  client-id: study-api

# =============================================================================
# Actuator — endpoints de operação
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
    metrics:
      export:
        url: ${OTEL_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 30s

# =============================================================================
# Logging estruturado (ECS)
# =============================================================================
logging:
  structured:
    format:
      console: ecs

---
# =============================================================================
# Profile: docker
# Ativado por SPRING_PROFILES_ACTIVE=docker (docker-compose.yml)
# Sobrescreve apenas os valores que mudam em ambiente de container.
# =============================================================================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # "postgres" resolve para o container PostgreSQL na rede Docker interna.
    url: jdbc:postgresql://postgres:5432/auth_db
