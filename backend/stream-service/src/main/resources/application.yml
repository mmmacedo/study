server:
  port: 8083

spring:
  application:
    name: stream-service

  threads:
    virtual:
      # Virtual threads para handlers que precisam de operações blocking (se houver).
      # WebFlux usa event loop por padrão — virtual threads complementam o modelo
      # reativo sem substituí-lo.
      enabled: true

  cloud:
    function:
      # Lista os beans Consumer/Supplier/Function que o Spring Cloud Stream deve vincular.
      # Separados por ponto-e-vírgula. Cada nome aqui gera um binding automático:
      #   userCreated     → binding "userCreated-in-0"
      #   userDeactivated → binding "userDeactivated-in-0"
      definition: userCreated;userDeactivated

    stream:
      bindings:
        userCreated-in-0:
          # Tópico Kafka de onde este binding consome mensagens.
          destination: user-created
          # Consumer group: garante que apenas UMA instância do stream-service
          # processe cada mensagem (sem group, cada instância receberia todas).
          group: stream-service
        userDeactivated-in-0:
          destination: user-deactivated
          group: stream-service

      kafka:
        # Configurações específicas do binder Kafka por binding.
        bindings:
          userCreated-in-0.consumer:
            # Retentativas antes de enviar para a DLQ.
            max-attempts: 3
            # Dead Letter Queue: mensagens que falharam após max-attempts vão aqui.
            # Permite auditoria e reprocessamento manual sem perda de dados.
            enable-dlq: true
            dlq-name: user-created.dlq
          userDeactivated-in-0.consumer:
            max-attempts: 3
            enable-dlq: true
            dlq-name: user-deactivated.dlq
        binder:
          # ${KAFKA_URL:localhost:9092}: usa variável de ambiente no Docker/K8s;
          # cai para localhost:9092 em desenvolvimento local.
          brokers: ${KAFKA_URL:localhost:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS endpoint do Keycloak para validar a assinatura dos JWTs.
          # O ReactiveJwtDecoder faz lazy-loading — não trava o startup se Keycloak
          # estiver fora do ar.
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/study/protocol/openid-connect/certs

management:
  endpoints.web.exposure.include: health,info,metrics
  endpoint.health.probes.enabled: true
  tracing.sampling.probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing.endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
    metrics.export:
      url: ${OTEL_ENDPOINT:http://localhost:4318}/v1/metrics
      step: 30s

logging:
  # ECS (Elastic Common Schema): formato JSON estruturado com trace.id embutido.
  # Permite correlacionar logs com traces no Jaeger pelo trace.id.
  structured.format.console: ecs

---
# Profile docker: sobrescreve apenas o que muda no ambiente containerizado.
# As demais configurações (porta, cloud.stream, security) são herdadas do profile default.
spring:
  config.activate.on-profile: docker
